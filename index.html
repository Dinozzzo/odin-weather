<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <img src="Blue weather-themed logo design.png" alt="logo" />
      <h1>Atmosfy</h1>
    </header>
    <main>
      <p>Welcome to <span class="brand">Atmosfy</span></p>
      <form class="inputs">
        <input type="text" id="city" placeholder="Enter a location.." />
        <button type="submit">Go</button>
      </form>
      <div class="display">
        <h2></h2>
        <div class="general-content">
          <div class="content">
            <h3 id="temp-title"></h3>
            <p id="temp"></p>
          </div>
          <div class="meteo-content" id="meteo">
            <h3 id="meteo-title"></h3>
          </div>
          <div class="content">
            <h3 id="feel-title"></h3>
            <p id="feel"></p>
          </div>
          <div class="content">
            <h3 id="humidity-title"></h3>
            <p id="humidity"></p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
